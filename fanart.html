<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
        if (window.location.hostname === 'helloroom123.github.io') {
            window.location.href = 'https://helloroom123-aurora-project.netlify.app' + window.location.pathname + window.location.search + window.location.hash;
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FANART - 舒苒 Aurora OFFICIAL SITE</title>
    <link rel="icon" href="assets/img/avatar/penguin.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=6">
</head>
<body class="subpage">
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
    </div>

    <nav class="navbar">
        <div class="logo">舒苒 AURORA</div>
        <div class="nav-links">
            <a href="index.html#home">TOP</a>
            <a href="news_paper.html">NEWS</a>
            <a href="index.html#profile">CHARACTER</a>
            <a href="index.html#story">STORY</a>
            <a href="index.html#credits">CREDITS</a>
            <a href="index.html#join">JOIN</a>
            <a href="fanart.html" style="color: var(--accent-color);">FANART</a>
        </div>
    </nav>

    <section class="content-section" style="padding-top: 150px; padding-bottom: 50px;">
        <h2 class="section-title">FANART</h2>
        <p style="font-weight: 700; font-size: 1.2rem; color: #000; letter-spacing: 1px;">同人作品展示 / GALLERY</p>
        <p style="margin-top: 10px; color: #666; font-size: 0.9rem;">
            使用标签 <strong>#AuroraArt</strong> 在社交媒体发布您的作品，我们将定期收录。
        </p>
    </section>

    <section class="content-section" style="padding-top: 0;">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="assets/img/fanart/1.jpeg" alt="Fanart 1" loading="lazy" onerror="this.src='assets/img/placeholder.png'">
                <div style="padding: 15px; background: #fff; border-top: 2px solid #000;">
                    <span style="font-weight: 700; font-size: 0.9rem;">ILLUSTRATION</span>
                </div>
            </div>

            <div class="gallery-item">
                <img src="assets/img/fanart/2.jpeg" alt="Fanart 2" loading="lazy" onerror="this.src='assets/img/placeholder.png'">
                <div style="padding: 15px; background: #fff; border-top: 2px solid #000;">
                    <span style="font-weight: 700; font-size: 0.9rem;">ILLUSTRATION</span>
                </div>
            </div>

            <div class="gallery-item">
                <img src="assets/img/fanart/3.png" alt="Fanart Draft" loading="lazy" onerror="this.src='assets/img/placeholder.png'">
                <div style="padding: 15px; background: #fff; border-top: 2px solid #000;">
                    <span style="font-weight: 700; font-size: 0.9rem;">DRAFT / SKETCH</span>
                    <span style="display: block; font-size: 0.8rem; color: #999; margin-top: 5px;">草稿设定</span>
                </div>
            </div>
        </div>

        <div class="qa-container" style="margin-top: 80px; max-width: 100%;">
            <div class="qa-item" style="text-align: center; border-color: var(--accent-color); box-shadow: 8px 8px 0px var(--accent-color);">
                <h3 style="font-size: 1.5rem; margin-bottom: 15px;">期待您的创作！</h3>
                <p style="margin-bottom: 20px;">无论是插画、文章还是音乐，我们都期待看到您眼中的舒苒。</p>
                <a href="index.html#join" class="hero-btn" style="display: inline-block; padding: 10px 30px; font-size: 0.9rem;">前往企划群投稿</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Aurora Project 企划项目组. 保留所有权利.</p>
    </footer>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loadingScreen');
            // 简单的淡出逻辑
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 800);
        });
    </script>
</body>
</html>
