<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANART - 舒苒 Aurora OFFICIAL SITE</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="subpage">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">舒苒 AURORA</div>
        <div class="nav-links">
            <a href="index.html#home">TOP</a>
            <a href="index.html#profile">CHARACTER</a>
            <a href="index.html#story">STORY</a>
            <a href="index.html#credits">CREDITS</a>
            <a href="qa.html">Q&A</a>
            <a href="staff_oc.html">STAFF OC</a>
            <a href="fanart.html">FANART</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="fanart-container">
        <div class="page-header" style="text-align: center; margin-bottom: 50px;">
            <h2 style="font-size: 3rem; margin-bottom: 10px;">FANART</h2>
            <span class="sub-header" style="font-size: 1.2rem; color: #666;">同人作品展示</span>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item">
                        <img src="assets/img/fanart/1.jpeg" alt="Fanart 1">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/img/fanart/2.jpeg" alt="Fanart 2">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/img/fanart/3.png" alt="Fanart Draft">
                        <div class="oc-desc" style="text-align: center; margin: 0; padding: 10px; font-size: 12px;">草稿 / Draft</div>
                    </div>
                </div>
            </div>

            <footer class="site-footer">
                <p>&copy; 2026 Aurora Project 企划项目组. 保留所有权利.</p>
            </footer>
    </div>
    
    <!-- 悬浮图片容器 -->
    <div class="floating-container">
        <div class="float-item item-1">✦</div>
        <div class="float-item item-2">✧</div>
        <div class="float-item item-3">✦</div>
        <div class="float-item item-4">✨</div>
        <div class="float-item item-5">☘️</div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader-content">
            <div class="loader-logo">舒苒<span>Aurora</span></div>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loadingScreen');
            const minTime = 1000; 
            const maxTime = 5000;
            const startTime = Date.now();

            const hideLoader = () => {
                const elapsedTime = Date.now() - startTime;
                const delay = Math.max(0, minTime - elapsedTime);
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, delay);
            };

            hideLoader();

            setTimeout(() => {
                if (loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    loader.style.display = 'none';
                }
            }, maxTime);
        });
    </script>
</body>
</html>
