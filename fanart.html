<body>
    <div class="site-container">
        <!-- 侧边导航栏 -->
        <header class="sidebar">
            <div class="logo-area">
                <h1>舒苒<span>Aurora</span></h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html#home">TOP</a></li>
                    <li><a href="index.html#profile">CHARACTER</a></li>
                    <li><a href="index.html#story">STORY</a></li>
                    <li><a href="index.html#credits">CREDITS</a></li>
                    <li><a href="qa.html">Q&A / ABOUT</a></li>
                    <li><a href="staff_oc.html">STAFF OC</a></li>
                    <li><a href="fanart.html" class="active">FANART</a></li>
                </ul>
            </nav>
            <div class="sns-links">
                <a href="#" class="sns-item">X (Twitter)</a>
                <a href="http://www.youtube.com/@fhcgfgc" target="_blank" class="sns-item">YouTube</a>
                <a href="https://space.bilibili.com/1495707613" target="_blank" class="sns-item">bilibili</a>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="content">
            <div class="page-header">
                <h2>FANART</h2>
                <span class="sub-header">同人作品展示</span>
            </div>

            <div class="fanart-container">
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="assets/img/fanart/1.jpeg" alt="Fanart 1">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/img/fanart/2.jpeg" alt="Fanart 2">
                    </div>
                    <div class="gallery-item">
                        <img src="assets/img/fanart/3.png" alt="Fanart Draft">
                        <div class="oc-desc" style="text-align: center; margin: 0; padding: 10px; font-size: 12px;">草稿 / Draft</div>
                    </div>
                </div>
            </div>

            <footer class="site-footer">
                <p>&copy; 2026 Aurora Project 企划项目组. 保留所有权利.</p>
            </footer>
        </main>
    </div>
    
    <!-- 悬浮图片容器 -->
    <div class="floating-container">
        <div class="float-item item-1">✦</div>
        <div class="float-item item-2">✧</div>
        <div class="float-item item-3">✦</div>
        <div class="float-item item-4">✨</div>
        <div class="float-item item-5">☘️</div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader-content">
            <div class="loader-logo">舒苒<span>Aurora</span></div>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loadingScreen');
            const minTime = 1000; 
            const maxTime = 5000;
            const startTime = Date.now();

            const hideLoader = () => {
                const elapsedTime = Date.now() - startTime;
                const delay = Math.max(0, minTime - elapsedTime);
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }, delay);
            };

            hideLoader();

            setTimeout(() => {
                if (loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    loader.style.display = 'none';
                }
            }, maxTime);
        });
    </script>
</body>
</html>
